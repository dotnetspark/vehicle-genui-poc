<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vehicle GenUI Demo A</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        background: #0b0f1a;
        color: #e5e7eb;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-feature-settings: 'cv11','ss01','ss03';
      }
      #root {
        padding: 16px;
        min-height: 320px;
        background:
          radial-gradient(1200px 400px at 10% -20%, rgba(99,102,241,0.18), transparent 60%),
          radial-gradient(900px 400px at 110% 120%, rgba(168,85,247,0.14), transparent 60%),
          #0b0f1a;
        border-radius: 12px;
      }
      /* Skeleton — visible from iframe mount until first tool result arrives */
      #skeleton {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 8px;
        height: 320px;
      }
      #skeleton .bar {
        background: linear-gradient(90deg, rgba(99,102,241,0.08) 0%, rgba(168,85,247,0.18) 50%, rgba(99,102,241,0.08) 100%);
        background-size: 200% 100%;
        border-radius: 6px;
        animation: shimmer 1.4s ease-in-out infinite;
      }
      #skeleton .b1 { height: 14px; width: 40%; }
      #skeleton .b2 { height: 14px; width: 25%; }
      #skeleton .chart {
        flex: 1;
        background: linear-gradient(90deg, rgba(99,102,241,0.08) 0%, rgba(168,85,247,0.18) 50%, rgba(99,102,241,0.08) 100%);
        background-size: 200% 100%;
        border-radius: 10px;
        animation: shimmer 1.4s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="skeleton" aria-label="Loading chart">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="chart"></div>
      </div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
